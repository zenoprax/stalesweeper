name: Lint Codebase

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Lint Codebase
        id: super-linter
        uses: super-linter/super-linter@d5b0a2ab116623730dd094f15ddc1b6b25bf7b99
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_JSCPD: false
          VALIDATE_MARKDOWN: false
          VALIDATE_GIT_COMMITLINT: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_TRIVY: false
          JAVASCRIPT_ES_CONFIG_FILE: ../../eslint.config.mjs
          TYPESCRIPT_ES_CONFIG_FILE: ../../eslint.config.mjs

      - name: Security Check - Runtime Dependencies
        id: audit-production
        run: |
          echo "🔍 Scanning production dependencies only (excludes devDependencies)..."
          npm audit --omit=dev --audit-level=high || true

          echo ""
          echo "📊 Production dependency count:"
          npm ls --omit=dev --depth=0

          echo ""
          echo "✅ Security check complete. This action's threat model:"
          echo "   • Runs in ephemeral GitHub Actions container"
          echo "   • No user input processing"
          echo "   • Only @actions/core and ansi-styles ship in dist/"
          echo "   • DevDependencies (eslint, jest, etc.) never execute in production"
