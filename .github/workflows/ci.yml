name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

      - name: Security Check - Runtime Dependencies
        id: audit-production
        run: |
          echo "🔍 Checking production dependencies for high/critical vulnerabilities..."
          npm audit --omit=dev --audit-level=high
